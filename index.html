<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex.devCode | Tech News</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-warning sticky-top">
        <div class="container">
            <a class="navbar-brand text-warning fw-bold" href="#">
                <i class="fa-solid fa-code"></i> Alex.devCode <span class="text-white">| News</span>
            </a>
            <button id="btn-download" class="btn btn-warning btn-sm fw-bold">
                <i class="fa-solid fa-file-export"></i> Descargar Top 10 .TXT
            </button>
        </div>
    </nav>

    <main class="container my-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold">Últimas Noticias 🌎</h1>
            <p class="text-secondary">Tecnología y Ciencia en tiempo real</p>
        </header>

        <div id="news-grid" class="row g-4">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-warning" role="status"></div>
                <p class="mt-3 text-warning">Sincronizando con la red...</p>
            </div>
        </div>
    </main>

    <script type="module" src="/main.js"></script>
</body>
</html>
